<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Performance Predictor</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            margin: 0;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            width: 600px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        h1 {
            text-align: center;
            margin-bottom: 10px;
        }

        .subtitle {
            text-align: center;
            color: gray;
            margin-bottom: 20px;
        }

        label {
            font-weight: 500;
            display: block;
            margin-top: 10px;
        }

        select, input {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border-radius: 8px;
            border: 1px solid #ccc;
            outline: none;
            transition: 0.3s;
        }

        select:focus, input:focus {
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102,126,234,0.5);
        }

        .row {
            display: flex;
            gap: 10px;
        }

        .row > div {
            flex: 1;
        }

        .btn {
            margin-top: 20px;
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        .result {
            margin-top: 20px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            color: #333;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Student Performance</h1>
    <p class="subtitle">Predict Math Score using ML Model</p>

    <form action="{{ url_for('predict_datapoint') }}" method="post">

        <label>Gender</label>
        <select name="gender" required>
            <option disabled selected value="">Select Gender</option>
            <option value="male">Male</option>
            <option value="female">Female</option>
        </select>

        <label>Race / Ethnicity</label>
        <select name="ethnicity" required>
            <option disabled selected value="">Select</option>
            <option value="group A">Group A</option>
            <option value="group B">Group B</option>
            <option value="group C">Group C</option>
            <option value="group D">Group D</option>
            <option value="group E">Group E</option>
        </select>

        <label>Parental Education</label>
        <select name="parental_level_of_education" required>
            <option disabled selected value="">Select</option>
            <option value="associate's degree">Associate</option>
            <option value="bachelor's degree">Bachelor</option>
            <option value="master's degree">Master</option>
            <option value="high school">High School</option>
            <option value="some college">Some College</option>
            <option value="some high school">Some High School</option>
        </select>

        <label>Lunch</label>
        <select name="lunch" required>
            <option disabled selected value="">Select</option>
            <option value="standard">Standard</option>
            <option value="free/reduced">Free/Reduced</option>
        </select>

        <label>Test Preparation</label>
        <select name="test_preparation_course" required>
            <option disabled selected value="">Select</option>
            <option value="none">None</option>
            <option value="completed">Completed</option>
        </select>

        <div class="row">
            <div>
                <label>Reading Score</label>
                <input type="number" name="reading_score" min="0" max="100" required>
            </div>

            <div>
                <label>Writing Score</label>
                <input type="number" name="writing_score" min="0" max="100" required>
            </div>
        </div>

        <button class="btn" type="submit">Predict Math Score 🚀</button>
    </form>

    <div class="result">
        {{ results }}
    </div>
</div>

</body>
</html>
